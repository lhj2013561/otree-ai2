{{ extends 'global/Page.html' }}

{{ block title }} {{ endblock }}

{{ block content }}

<style>

.page-wrap{
    max-width:720px;
    margin:0 auto;
}

.intro-text{
    font-size:17px;
    line-height:1.7;
    margin-bottom:30px;
    color:#555;
}

/* 🔥 스토리 카드 */
.scenario-card{
    background:#ffffff;
    border-radius:14px;
    padding:48px;
    box-shadow:0 12px 28px rgba(0,0,0,0.12);
    margin-bottom:30px;
    border:1px solid #eee;
}

.scenario-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:30px;
    color:#444;
}

/* 🔥 스토리 텍스트 크게 */
.scenario-text{
    font-size:22px;
    line-height:1.9;
    font-weight:500;
    color:#111;
}

/* 보조 지시문 */
.immersion-box{
    background:#f5f6f7;
    border-radius:10px;
    padding:22px;
    font-size:16px;
    color:#555;
    margin-bottom:35px;
}

.next-btn{
    width:100%;
    font-size:18px;
    padding:14px;
}

</style>

<div class="page-wrap">

<div class="intro-text">
지금부터 <b>AI와 대화</b>를 시작하게 됩니다.<br>
아래 상황을 천천히 읽고 <b>자신이 실제로 이 상황에 처해 있다고 상상해 보세요.</b>
</div>


<div class="scenario-card">

<div class="scenario-title">
다음 상황을 읽어 주세요
</div>

<div class="scenario-text">
{{ scenario_text }}
</div>

</div>


<div class="immersion-box">
이 상황의 <b>주인공이 바로 당신이라고 생각해 보세요.</b><br>
이 상황에서 어떤 감정이 들 것 같은지 잠시 떠올려 보세요.
</div>


<button type="submit" class="btn btn-primary btn-lg next-btn">
다음 단계로 이동
</button>

</div>

{{ endblock }}
