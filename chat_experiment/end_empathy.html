{{ extends 'global/Page.html' }}

{{ block title }}
{{ endblock }}

{{ block content }}

<style>
.survey-container{
    max-width:650px;
    margin:0 auto;
}
.question-block{
    margin-bottom:60px;
    padding:20px;
    border-bottom:1px solid #eee;
}
.question-text{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:30px;
    line-height:1.6;
}
.radio-row{
    display:flex;
    justify-content:space-between;
    padding:0 10px;
    margin-bottom:10px;
}
.radio-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    flex:1;
}
input[type="radio"]{
    transform:scale(1.7);
    cursor:pointer;
}
.legend-row{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-size:0.95rem;
    font-weight:bold;
    color:#444;
}
.legend-item{
    width:140px;
    line-height:1.3;
}
.radio-unit label{
    display:none !important;
}
.highlight-instruction {
    font-size: 1.35rem;
    font-weight: 800;
    text-align: center;
    word-break: keep-all;
    border-radius: 10px;
    padding: 25px 20px;
    background-color: #e7f1ff;
    color: #084298;
    border: 2px solid #b6d4fe;
}
</style>

<div class="survey-container">

<div class="highlight-instruction mb-5 shadow-sm">
    💡 지금까지 4번의 대화를 진행하면서, AI 상담자에게 전반적으로 어떻게 느끼셨는지 평가해 주세요.
</div>

{{ for field in form }}
<div class="question-block">

    <div class="question-text">
        {{ field.label }}
    </div>

    <div class="radio-row">
        {{ for choice in field }}
        <div class="radio-unit">
            {{ choice }}
        </div>
        {{ endfor }}
    </div>

    <div class="legend-row">
        <div class="legend-item text-start">
            1. 전혀<br>그렇지 않다
        </div>

        <div class="legend-item text-end">
            5. 매우<br>그렇다
        </div>
    </div>

</div>
{{ endfor }}

<div class="d-grid gap-2 mt-5 mb-5">
    <button class="otree-btn-next btn btn-primary btn-lg shadow">
        다음으로 넘어가기
    </button>
</div>

</div>

{{ endblock }}
